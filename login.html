<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - Perla Nera</title>
    <link rel="stylesheet" href="style.css">

    <script defer src="[gstatic.com](https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js)"></script>
    <script defer src="[gstatic.com](https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js)"></script>

    <script defer src="firebase.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
<header>
    <img src="img/logo.png" class="logo">
</header>

<section class="content">
    <h2>Accesso Admin</h2>

    <form id="loginForm" class="contact-form">
        <label>Email</label>
        <input type="email" id="loginEmail" required>

        <label>Password</label>
        <input type="password" id="loginPassword" required>

        <button type="submit">Accedi</button>
    </form>
</section>

<footer>© 2026 Perla Nera</footer>
</body>
</html>
